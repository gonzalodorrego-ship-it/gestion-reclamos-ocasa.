<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCASA - Gestión de Reclamos</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --ocasa-cyan: #0097A7; }
        body { font-family: 'Roboto', sans-serif; background-color: #F8FAFC; color: #1e293b; }
        .bg-ocasa-cyan { background-color: var(--ocasa-cyan); }
        
        /* Estilo para que la tabla sea scrolleable en móvil */
        .table-container { overflow-x: auto; border-radius: 2rem; border: 1px solid #e2e8f0; background: white; }
        
        #sidebar { transition: transform 0.3s ease; z-index: 100; }
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); position: fixed; height: 100vh; }
            #sidebar.open { transform: translateX(0); }
        }

        .menu-link {
            display: flex; align-items: center; gap: 12px; padding: 14px 20px;
            border-radius: 16px; font-size: 13px; font-weight: 700; color: #64748b;
            transition: all 0.2s; text-transform: uppercase;
        }
        .menu-link:hover { background-color: #f1f5f9; color: var(--ocasa-cyan); }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <aside id="sidebar" class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0">
        <div class="p-8 border-b border-slate-100 flex flex-col items-center">
            <img src="logo_ocasa.png" alt="OCASA" class="max-w-[140px] mb-2 cursor-pointer" onclick="showView('home')">
            <span class="text-[10px] text-slate-400 font-black tracking-widest uppercase italic">Logística Global</span>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showView('carga')" class="menu-link w-full"><i data-lucide="file-plus" class="w-4 h-4"></i> Cargar Reclamo</button>
            <button onclick="showView('historico')" class="menu-link w-full text-ocasa-cyan bg-slate-50"><i data-lucide="history" class="w-4 h-4"></i> Histórico</button>
        </nav>
        <div class="p-6 border-t border-slate-100 flex items-center gap-3 text-xs font-bold">
            <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-ocasa-cyan italic">GD</div>
            <span>Gonzalo Dorrego</span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-white">
        <header class="h-16 md:h-20 bg-white border-b border-slate-100 px-6 flex items-center justify-between">
            <h2 id="viewTitle" class="text-lg font-black text-slate-800 uppercase italic tracking-tighter">Historial General</h2>
            <button onclick="init()" class="p-2 hover:bg-slate-50 rounded-full"><i data-lucide="rotate-cw" class="w-5 h-5 text-slate-400"></i></button>
        </header>

        <div id="contentFrame" class="flex-1 overflow-y-auto p-4 md:p-10">
            <div class="table-container">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase italic">
                        <tr>
                            <th class="p-5">Fecha</th>
                            <th class="p-5">Remito</th>
                            <th class="p-5">Tipo</th>
                            <th class="p-5">Prioridad</th>
                            <th class="p-5">Descripción</th>
                            <th class="p-5">Resolución</th>
                            <th class="p-5">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaBody" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxFHWQ13RweDSf1sfABKyTfFcsRgg99_nhkjVI9EIS9VvfLeJp5J2ys5UWDKgrg71F1pw/exec';

        async function init() {
            try {
                const res = await fetch(WEB_APP_URL);
                const datos = await res.json();
                renderizarTabla(datos);
            } catch (e) { console.error("Error cargando datos"); }
        }

        function renderizarTabla(data) {
            const tbody = document.getElementById('tablaBody');
            if(!tbody) return;
            tbody.innerHTML = data.map(item => {
                // Formateamos la fecha para que sea legible y corta
                const fechaDisplay = item.fecha ? item.fecha.split(',')[0] : '-';
                
                return `
                <tr class="border-t border-slate-50 hover:bg-slate-50/50 transition-colors">
                    <td class="p-5 text-[10px] font-bold text-slate-400 whitespace-nowrap">${fechaDisplay}</td>
                    <td class="p-5 font-black text-slate-900">${item.remito}</td>
                    <td class="p-5 text-slate-600 font-bold italic">${item.tipo}</td>
                    <td class="p-5">
                        <span class="font-bold ${item.prioridad === 'Alta' ? 'text-red-500' : 'text-slate-400'} text-[10px] uppercase">${item.prioridad}</span>
                    </td>
                    <td class="p-5 text-xs text-slate-500 max-w-[200px] truncate">${item.descripcion}</td>
                    <td class="p-5 text-[11px] italic text-slate-400">${item.resolucion || '-'}</td>
                    <td class="p-5 text-right">
                        <span class="px-3 py-1.5 ${item.estado === 'Finalizado' ? 'bg-cyan-50 text-ocasa-cyan border-cyan-200' : 'bg-orange-50 text-orange-600 border-orange-200'} rounded-full text-[9px] font-black uppercase border tracking-tighter">${item.estado}</span>
                    </td>
                </tr>`;
            }).join('');
            lucide.createIcons();
        }

        init();
    </script>
</body>
</html>
