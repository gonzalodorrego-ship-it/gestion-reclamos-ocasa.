<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCASA - Gestión de Reclamos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocasa-cyan: #0097A7;
            --ocasa-black: #1A1A1A;
        }
        body { font-family: 'Inter', sans-serif; background-color: #F4F7F9; }
        .bg-ocasa-cyan { background-color: var(--ocasa-cyan); }
        .text-ocasa-cyan { color: var(--ocasa-cyan); }
        .bg-ocasa-black { background-color: var(--ocasa-black); }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--ocasa-cyan); border-radius: 10px; }
        
        .btn-primary {
            background-color: var(--ocasa-cyan);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #007A87;
            transform: translateY(-1px);
        }
        .recurrence-alert { border-left: 5px solid #E53935 !important; background-color: #FFF5F5; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="w-64 bg-ocasa-black text-white flex flex-col shadow-2xl z-50">
        <div class="p-8 border-b border-white/5 flex flex-col items-center gap-4">
            <div class="bg-white p-2 rounded-lg">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Ocasa_logo.png" alt="OCASA" class="w-32 h-auto">
            </div>
            <span class="text-[9px] text-cyan-400 font-black tracking-[0.3em] uppercase opacity-80">Logística Integral</span>
        </div>
        
        <nav class="flex-1 px-4 py-8 space-y-3">
            <button onclick="location.reload()" class="w-full flex items-center gap-3 px-4 py-4 rounded-xl btn-primary font-bold shadow-lg active:scale-95">
                <i data-lucide="plus-square" class="w-5 h-5"></i> NUEVO RECLAMO
            </button>
            <button id="btnHistorico" class="w-full flex items-center gap-3 px-4 py-4 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> PANEL DE CONTROL
            </button>
        </nav>

        <div class="p-6 border-t border-white/5 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-ocasa-cyan flex items-center justify-center font-bold text-xs text-white">GD</div>
            <div class="flex flex-col">
                <span class="text-[11px] font-bold">Gonzalo Dorrego</span>
                <span class="text-[9px] text-gray-500 uppercase font-black">Admin Sistema</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-gray-100 px-10 flex items-center justify-between shadow-sm">
            <h2 class="text-xl font-black text-gray-800 uppercase tracking-tighter flex items-center gap-3">
                <span class="w-1.5 h-6 bg-ocasa-cyan rounded-full"></span>
                Gestión de Reclamos Cloud
            </h2>
            <div class="flex flex-col text-right">
                <span id="clock" class="text-sm font-bold text-gray-800">00:00:00</span>
                <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Sistema Activo</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-12 bg-[#F4F7F9]">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white rounded-[2.5rem] shadow-2xl border border-gray-100 overflow-hidden">
                    <div class="bg-ocasa-cyan h-2.5 w-full"></div>
                    <form id="formReclamo" class="p-10 space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-3">
                                <label class="text-[11px] font-black uppercase text-gray-400 tracking-widest">Tipo de Reclamo</label>
                                <select id="tipo" class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 bg-gray-50 focus:border-ocasa-cyan focus:bg-white outline-none font-bold text-gray-700 transition-all">
                                    <option value="Caja rota">📦 Caja rota / Dañada</option>
                                    <option value="Producto equivocado">🔄 Producto equivocado</option>
                                    <option value="Color equivocado">🎨 Color equivocado</option>
                                    <option value="No recibi mi producto">🚫 No recibí mi producto</option>
                                    <option value="Faltante parcial">📉 Faltante parcial</option>
                                </select>
                            </div>
                            <div class="space-y-3">
                                <label class="text-[11px] font-black uppercase text-gray-400 tracking-widest">ID de Reclamo (Remito)</label>
                                <input type="text" id="remito" required placeholder="EJ: REC-99827" class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 bg-gray-50 focus:border-ocasa-cyan focus:bg-white outline-none font-bold text-gray-700 uppercase transition-all">
                            </div>
                        </div>

                        <div class="space-y-3">
                            <label class="text-[11px] font-black uppercase text-gray-400 tracking-widest">Detalle del Reclamo</label>
                            <textarea id="descripcion" rows="4" required placeholder="Describe brevemente el problema..." class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 bg-gray-50 focus:border-ocasa-cyan focus:bg-white outline-none font-medium text-gray-700 transition-all resize-none"></textarea>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-3">
                                <label class="text-[11px] font-black uppercase text-gray-400 tracking-widest">Ubicación del Incidente</label>
                                <select id="estado" class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 bg-gray-50 focus:border-ocasa-cyan focus:bg-white outline-none font-bold text-gray-700">
                                    <option>Depósito Central</option>
                                    <option>Transporte / En Viaje</option>
                                    <option>Sucursal Destino</option>
                                    <option>Pickeo / Embalaje</option>
                                </select>
                            </div>
                            <div class="space-y-3">
                                <label class="text-[11px] font-black uppercase text-gray-400 tracking-widest">Urgencia</label>
                                <select id="prioridad" class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 bg-gray-50 focus:border-ocasa-cyan focus:bg-white outline-none font-bold text-gray-700">
                                    <option value="Baja">Baja (48hs)</option>
                                    <option value="Media" selected>Media (24hs)</option>
                                    <option value="Alta">Alta (Inmediata)</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex items-center justify-end pt-8">
                            <button type="submit" id="btnEnviar" class="btn-primary px-12 py-5 rounded-2xl font-black text-sm flex items-center gap-3 shadow-xl">
                                <i data-lucide="save" class="w-5 h-5"></i> GUARDAR RECLAMO
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div id="modalHistorico" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center p-6">
            <div class="bg-white w-full max-w-7xl rounded-[2.5rem] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
                <div class="p-8 border-b flex justify-between items-center bg-ocasa-black text-white">
                    <div class="flex items-center gap-4">
                        <div class="bg-ocasa-cyan p-2 rounded-lg text-white">
                            <i data-lucide="database" class="w-6 h-6"></i>
                        </div>
                        <h3 class="font-black text-xl uppercase tracking-tighter">Panel de Reclamos Registrados</h3>
                    </div>
                    <div class="relative w-96">
                        <i data-lucide="search" class="absolute left-4 top-3 text-gray-400 w-4 h-4"></i>
                        <input type="text" id="busquedaInput" placeholder="Buscar por ID o Problema..." class="w-full bg-white/10 border border-white/10 rounded-xl py-2 pl-10 pr-4 text-sm outline-none focus:bg-white focus:text-black">
                    </div>
                    <button id="cerrarModal" class="p-2 hover:bg-white/10 rounded-full text-white">
                        <i data-lucide="x" class="w-8 h-8"></i>
                    </button>
                </div>
                <div class="flex-1 overflow-auto p-8 custom-scroll">
                    <table class="w-full text-left border-separate border-spacing-y-2">
                        <thead>
                            <tr class="text-[10px] font-black text-gray-400 uppercase tracking-widest">
                                <th class="px-4">Fecha</th>
                                <th class="px-4">ID Reclamo</th>
                                <th class="px-4">Tipo de Reclamo</th>
                                <th class="px-4">Detalle</th>
                                <th class="px-4">Ubicación</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCuerpo" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxs6-28lVAXxzHRSCRVMijfUlJ7IWtImxlhatT1GNA4U3OLmx2A-E5eZXekfX1hrvxARQ/exec';
        let datosHistoricos = [];

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        document.getElementById('formReclamo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            const payload = {
                fecha: new Date().toLocaleString(),
                tipo: document.getElementById('tipo').value,
                remito: document.getElementById('remito').value.trim().toUpperCase(),
                descripcion: document.getElementById('descripcion').value,
                prioridad: document.getElementById('prioridad').value,
                estado: document.getElementById('estado').value,
                usuario: "Gonzalo Dorrego"
            };
            btn.disabled = true;
            btn.innerText = "Sincronizando...";
            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                document.getElementById('formReclamo').reset();
                alert("¡Reclamo Guardado!");
            } catch (error) { alert("Error"); }
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> GUARDAR RECLAMO`;
            lucide.createIcons();
        });

        async function cargarPanel() {
            const tabla = document.getElementById('tablaCuerpo');
            tabla.innerHTML = '<tr><td colspan="5" class="py-10 text-center text-gray-400 animate-pulse">Consultando base de datos OCASA...</td></tr>';
            try {
                const response = await fetch(WEB_APP_URL);
                datosHistoricos = await response.json();
                renderizarTabla(datosHistoricos);
            } catch (e) { tabla.innerHTML = '<tr><td colspan="5" class="py-10 text-center text-red-500">Error de red</td></tr>'; }
        }

        function renderizarTabla(data) {
            const tabla = document.getElementById('tablaCuerpo');
            tabla.innerHTML = '';
            
            const conteo = data.reduce((acc, item) => {
                const r = item.remito?.toUpperCase();
                acc[r] = (acc[r] || 0) + 1;
                return acc;
            }, {});

            data.forEach(item => {
                const esRecurrente = conteo[item.remito?.toUpperCase()] > 1;
                tabla.innerHTML += `
                    <tr class="${esRecurrente ? 'recurrence-alert' : 'bg-gray-50 hover:bg-cyan-50'} rounded-xl overflow-hidden shadow-sm">
                        <td class="py-4 px-4 font-bold text-gray-400 text-[11px]">${item.fecha}</td>
                        <td class="py-4 px-4 font-black text-gray-800">${item.remito}</td>
                        <td class="py-4 px-4 font-bold text-gray-700">${item.tipo}</td>
                        <td class="py-4 px-4 text-gray-600 italic text-xs max-w-xs truncate">${item.descripcion || '-'}</td>
                        <td class="py-4 px-4">
                            <span class="px-2 py-1 rounded bg-cyan-100 text-cyan-800 text-[9px] font-black uppercase">${item.estado}</span>
                            ${esRecurrente ? '<span class="ml-2 px-2 py-1 rounded bg-red-600 text-white text-[9px] font-black">REPETIDO</span>' : ''}
                        </td>
                    </tr>`;
            });
        }

        document.getElementById('btnHistorico').addEventListener('click', () => {
            document.getElementById('modalHistorico').classList.remove('hidden');
            cargarPanel();
        });
        document.getElementById('cerrarModal').addEventListener('click', () => document.getElementById('modalHistorico').classList.add('hidden'));

        document.getElementById('busquedaInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtrados = datosHistoricos.filter(item => 
                (item.remito?.toLowerCase() || "").includes(term) || 
                (item.tipo?.toLowerCase() || "").includes(term)
            );
            renderizarTabla(filtrados);
        });
    </script>
</body>
</html>
