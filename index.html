<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCASA - Sistema de Gestión Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ocasa-cyan: #0097A7; }
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; overflow: hidden; }
        .bg-ocasa-cyan { background-color: var(--ocasa-cyan); }
        .text-ocasa-cyan { color: var(--ocasa-cyan); }
        
        #menuContent { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        #menuContent.open { max-height: 500px; }
        
        .menu-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: 12px; font-size: 13px; font-weight: 700; color: #64748b;
            transition: all 0.2s; text-transform: uppercase; width: 100%;
        }
        .menu-link:hover { background-color: #f1f5f9; color: var(--ocasa-cyan); }

        .hero-bg {
            background-image: linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.75)), 
                              url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Prioridad Alta: Resalte en rojo */
        .priority-high { border-left: 5px solid #ef4444 !important; background-color: #fef2f2 !important; }
    </style>
</head>
<body class="h-screen flex">

    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col z-50">
        <div class="p-8 border-b border-slate-100 flex flex-col items-center">
            <img src="logo_ocasa.png" alt="OCASA" class="max-w-[150px] mb-2 cursor-pointer" onclick="showView('home')">
            <span class="text-[10px] text-slate-400 font-black tracking-widest uppercase">Logística Global</span>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto custom-scroll">
            <button onclick="toggleMenu()" class="w-full flex items-center justify-between px-5 py-4 bg-ocasa-cyan text-white rounded-2xl font-bold shadow-lg shadow-cyan-500/20 active:scale-95 transition-all">
                <div class="flex items-center gap-3">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                    <span class="text-sm tracking-tight uppercase">Menú Principal</span>
                </div>
                <i data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-300" id="menuChevron"></i>
            </button>
            
            <div id="menuContent" class="mt-2 space-y-1 bg-slate-50 rounded-2xl p-2 border border-slate-100">
                <button onclick="showView('carga')" class="menu-link"><i data-lucide="file-plus" class="w-4 h-4"></i> Cargar Reclamo</button>
                <button onclick="showView('historico')" class="menu-link"><i data-lucide="history" class="w-4 h-4"></i> Histórico</button>
                <button onclick="showView('stats')" class="menu-link"><i data-lucide="pie-chart" class="w-4 h-4"></i> Estadísticas</button>
            </div>
        </nav>

        <div class="p-6 border-t border-slate-100 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-black text-ocasa-cyan border border-slate-200 text-xs">GD</div>
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-900">Gonzalo Dorrego</span>
                <span class="text-[9px] text-slate-400 uppercase font-black">Admin Sistema</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-20 bg-white border-b border-slate-100 px-10 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-4">
                <span class="w-1.5 h-6 bg-ocasa-cyan rounded-full"></span>
                <h2 id="viewTitle" class="text-lg font-black text-slate-800 uppercase tracking-tighter">Panel Central</h2>
            </div>
            <div id="reloj" class="text-sm font-black text-slate-700">00:00:00</div>
        </header>

        <div id="contentFrame" class="flex-1 overflow-y-auto custom-scroll">
            </div>
    </main>

    <script>
        // URL de tu planilla
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxs6-28lVAXxzHRSCRVMijfUlJ7IWtImxlhatT1GNA4U3OLmx2A-E5eZXekfX1hrvxARQ/exec';
        let datosFull = [];
        let datosFiltrados = [];

        // Iniciar Iconos
        lucide.createIcons();

        // Reloj en tiempo real
        setInterval(() => { 
            const r = document.getElementById('reloj');
            if(r) r.innerText = new Date().toLocaleTimeString(); 
        }, 1000);

        function toggleMenu() {
            document.getElementById('menuContent').classList.toggle('open');
            document.getElementById('menuChevron').classList.toggle('rotate-180');
        }

        async function showView(view) {
            const frame = document.getElementById('contentFrame');
            const title = document.getElementById('viewTitle');
            frame.className = "flex-1 overflow-y-auto custom-scroll p-10";
            
            if (view === 'home') {
                frame.classList.add('hero-bg', 'flex', 'items-center', 'justify-center');
                title.innerText = "Bienvenido";
                frame.innerHTML = `
                    <div class="text-center space-y-4 max-w-xl bg-white/70 backdrop-blur-xl p-16 rounded-[4rem] shadow-2xl border border-white">
                        <i data-lucide="truck" class="w-20 h-20 text-ocasa-cyan mx-auto mb-4"></i>
                        <h1 class="text-4xl font-black text-slate-800 uppercase tracking-tighter">Gestión Global</h1>
                        <p class="text-slate-600 font-medium italic">Seleccione una operación en el menú para comenzar.</p>
                    </div>`;
            } 

            else if (view === 'stats') {
                title.innerText = "Dashboard de Control";
                frame.innerHTML = `
                    <div class="max-w-5xl mx-auto space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Registros</span>
                                <p class="text-4xl font-black text-slate-800 mt-2">${datosFull.length}</p>
                            </div>
                            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pendientes</span>
                                <p class="text-4xl font-black text-orange-500 mt-2">${datosFull.filter(d => d.estado === 'Pendiente').length}</p>
                            </div>
                            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Eficiencia SLA</span>
                                <p class="text-4xl font-black text-emerald-500 mt-2">92%</p>
                            </div>
                        </div>
                    </div>`;
            }

            else if (view === 'carga') {
                title.innerText = "Nuevo Reclamo";
                frame.innerHTML = `
                    <div class="max-w-2xl mx-auto bg-white rounded-[3rem] shadow-xl border border-slate-100 p-12">
                        <form id="formCarga" class="space-y-8">
                            <div class="grid grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Tipo de Incidencia</label>
                                    <select id="f-tipo" class="w-full p-5 rounded-2xl bg-slate-50 border border-slate-100 outline-none font-bold">
                                        <option>Caja rota</option><option>Producto equivocado</option><option>No recibí producto</option>
                                    </select>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Prioridad</label>
                                    <select id="f-prioridad" class="w-full p-5 rounded-2xl bg-slate-50 border border-slate-100 outline-none font-bold">
                                        <option value="Baja">Baja</option><option value="Media">Media</option><option value="Alta">Alta / Crítica</option>
                                    </select>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">N° Remito / ID</label>
                                <input type="text" id="f-remito" required placeholder="0000-0000" class="w-full p-5 rounded-2xl bg-slate-50 border border-slate-100 outline-none font-bold">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Descripción Detallada</label>
                                <textarea id="f-desc" rows="4" required class="w-full p-5 rounded-2xl bg-slate-50 border border-slate-100 outline-none font-medium"></textarea>
                            </div>
                            <button type="submit" class="w-full bg-ocasa-cyan text-white py-5 rounded-2xl font-black uppercase text-sm shadow-xl active:scale-95 transition-all">Sincronizar con Planilla</button>
                        </form>
                    </div>`;
                
                document.getElementById('formCarga').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = e.target.querySelector('button');
                    btn.disabled = true; btn.innerText = "Sincronizando...";
                    const payload = {
                        fecha: new Date().toLocaleString(),
                        tipo: document.getElementById('f-tipo').value,
                        remito: document.getElementById('f-remito').value,
                        descripcion: document.getElementById('f-desc').value,
                        prioridad: document.getElementById('f-prioridad').value,
                        estado: "Pendiente", usuario: "Gonzalo Dorrego"
                    };
                    try {
                        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                        alert("¡Reclamo Guardado!"); 
                        init(); // Recargar datos
                    } catch(err) { alert("Error al guardar"); }
                });
            }

            else if (view === 'historico') {
                title.innerText = "Historial de Operaciones";
                datosFiltrados = [...datosFull];
                frame.innerHTML = `
                    <div class="max-w-6xl mx-auto space-y-6">
                        <div class="flex items-center justify-between bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                            <div class="relative w-96">
                                <i data-lucide="search" class="absolute left-4 top-3 text-slate-400 w-4 h-4"></i>
                                <input type="text" id="searchTable" oninput="filtrarTabla()" placeholder="Buscar por remito..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-100 rounded-full text-sm outline-none focus:ring-2 focus:ring-cyan-100">
                            </div>
                            <button onclick="exportarCSV()" class="flex items-center gap-2 bg-slate-800 text-white px-6 py-2.5 rounded-full font-black text-[10px] uppercase hover:bg-black transition-all">
                                <i data-lucide="download" class="w-4 h-4"></i> Exportar Reporte (.CSV)
                            </button>
                        </div>
                        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                                    <tr><th class="p-6">Fecha</th><th class="p-6">Remito</th><th class="p-6">Tipo</th><th class="p-6">Prioridad</th><th class="p-6">Estado</th></tr>
                                </thead>
                                <tbody id="tablaBody" class="text-sm italic">
                                    </tbody>
                            </table>
                        </div>
                    </div>`;
                renderizarTabla(datosFiltrados);
            }
            lucide.createIcons();
        }

        function renderizarTabla(data) {
            const tbody = document.getElementById('tablaBody');
            if(!tbody) return;
            tbody.innerHTML = '';
            data.forEach(item => {
                const esAlta = item.prioridad === 'Alta';
                tbody.innerHTML += `
                    <tr class="border-t border-slate-50 hover:bg-slate-50/50 transition-colors ${esAlta ? 'priority-high' : ''}">
                        <td class="p-6 text-slate-400 font-medium">${item.fecha}</td>
                        <td class="p-6 font-black text-slate-800">${item.remito}</td>
                        <td class="p-6 font-bold text-slate-600">${item.tipo}</td>
                        <td class="p-6"><span class="text-[10px] font-black ${esAlta ? 'text-red-600' : 'text-slate-400'} uppercase">${item.prioridad || 'Media'}</span></td>
                        <td class="p-6"><span class="px-3 py-1 bg-cyan-50 text-ocasa-cyan rounded-full text-[10px] font-black uppercase">${item.estado}</span></td>
                    </tr>`;
            });
        }

        function filtrarTabla() {
            const term = document.getElementById('searchTable').value.toLowerCase();
            datosFiltrados = datosFull.filter(d => 
                d.remito.toLowerCase().includes(term) || 
                d.tipo.toLowerCase().includes(term)
            );
            renderizarTabla(datosFiltrados);
        }

        function exportarCSV() {
            if(datosFiltrados.length === 0) return alert("Nada que exportar");
            const headers = ["Fecha", "Remito", "Tipo", "Prioridad", "Estado"];
            const csv = [
                headers.join(","),
                ...datosFiltrados.map(i => [`"${i.fecha}"`,`"${i.remito}"`,`"${i.tipo}"`,`"${i.prioridad}"`,`"${i.estado}"`].join(","))
            ].join("\n");
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Reporte_OCASA_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }

        async function init() {
            try {
                const res = await fetch(WEB_APP_URL);
                datosFull = await res.json();
            } catch (e) { console.error("Error al conectar con la base de datos"); }
            showView('home');
        }

        // Carga inicial
        init();
    </script>
</body>
</html>
