<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCASA - Gestión de Reclamos</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --ocasa-cyan: #0097A7; }
        body { font-family: 'Roboto', sans-serif; background-color: #F8FAFC; margin: 0; padding: 0; }
        .bg-ocasa-cyan { background-color: var(--ocasa-cyan); }
        .text-ocasa-cyan { color: var(--ocasa-cyan); }
        
        #sidebar { transition: transform 0.3s ease-in-out; z-index: 100; }
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); position: fixed; height: 100vh; }
            #sidebar.open { transform: translateX(0); }
            #overlay.show { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }
        }

        #menuContent { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        #menuContent.open { max-height: 800px; }
        
        .menu-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: 12px; font-size: 13px; font-weight: 700; color: #64748b;
            transition: all 0.2s; text-transform: uppercase; width: 100%;
        }
        .menu-link:hover { background-color: #f1f5f9; color: var(--ocasa-cyan); }

        .hero-bg {
            background-image: linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.75)), 
                              url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=1000&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }
        .priority-high { border-left: 5px solid #ef4444 !important; background-color: #fef2f2 !important; }
        #overlay { display: none; }
        
        @keyframes pulse-red {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .has-alerts { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <div id="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0">
        <div class="p-8 border-b border-slate-100 flex flex-col items-center">
            <img src="logo_ocasa.png" alt="OCASA" class="max-w-[140px] mb-2 cursor-pointer" onclick="showView('home'); toggleSidebar();">
            <span class="text-[10px] text-slate-400 font-bold tracking-widest uppercase italic">Logística Global</span>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="toggleMenu()" class="w-full flex items-center justify-between px-5 py-4 bg-ocasa-cyan text-white rounded-2xl font-bold shadow-lg shadow-cyan-500/20 active:scale-95 transition-all">
                <div class="flex items-center gap-3">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                    <span class="text-sm tracking-tight uppercase">Menú Principal</span>
                </div>
                <i data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-300" id="menuChevron"></i>
            </button>
            
            <div id="menuContent" class="mt-2 space-y-1 bg-slate-50 rounded-2xl p-2 border border-slate-100">
                <button onclick="showView('carga'); toggleSidebar();" class="menu-link"><i data-lucide="file-plus" class="w-4 h-4"></i> Cargar Reclamo</button>
                <button onclick="showView('historico'); toggleSidebar();" class="menu-link"><i data-lucide="history" class="w-4 h-4"></i> Histórico</button>
                <button onclick="showView('stats'); toggleSidebar();" class="menu-link"><i data-lucide="pie-chart" class="w-4 h-4"></i> Estadísticas</button>
                
                <div class="border-t border-slate-200 my-2 pt-2">
                    <p class="px-4 text-[9px] font-black text-slate-400 uppercase mb-2">Herramientas</p>
                    <button onclick="alert('Mapa en desarrollo')" class="menu-link text-slate-500 opacity-60"><i data-lucide="map" class="w-4 h-4"></i> Mapa de Alertas</button>
                    <button onclick="alert('Redirigiendo a Tracking OCASA...')" class="menu-link text-slate-500 opacity-60"><i data-lucide="truck" class="w-4 h-4"></i> Tracking Externo</button>
                </div>
            </div>
        </nav>

        <div class="p-6 border-t border-slate-100 flex items-center gap-3 bg-slate-50/50">
            <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center font-bold text-ocasa-cyan border border-slate-200 shadow-sm text-xs">GD</div>
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-900 leading-tight">Gonzalo Dorrego</span>
                <span class="text-[9px] text-slate-400 uppercase font-bold tracking-wider">Admin Sistema</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-white">
        <header class="h-16 md:h-20 bg-white border-b border-slate-100 px-4 md:px-10 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden p-2 text-slate-600">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <span class="hidden md:block w-1.5 h-6 bg-ocasa-cyan rounded-full"></span>
                <h2 id="viewTitle" class="text-sm md:text-lg font-black text-slate-800 uppercase truncate">Panel de Gestión</h2>
            </div>
            
            <div class="relative">
                <button onclick="mostrarAlertas()" id="btnNotif" class="p-2 rounded-full hover:bg-slate-100 transition-colors relative">
                    <i data-lucide="bell" class="w-6 h-6 text-slate-600"></i>
                    <span id="badgeNotif" class="hidden absolute top-1 right-1 bg-red-500 text-white text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full border-2 border-white">0</span>
                </button>
            </div>
        </header>

        <div id="contentFrame" class="flex-1 overflow-y-auto overflow-x-hidden p-4 md:p-10"></div>
    </main>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxs6-28lVAXxzHRSCRVMijfUlJ7IWtImxlhatT1GNA4U3OLmx2A-E5eZXekfX1hrvxARQ/exec';
        let datosFull = [];
        let reclamosAtrasados = [];

        function toggleSidebar() {
            if (window.innerWidth >= 768) return;
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function toggleMenu() {
            document.getElementById('menuContent').classList.toggle('open');
            document.getElementById('menuChevron').classList.toggle('rotate-180');
        }

        function procesarAlertas() {
            const ahora = new Date();
            reclamosAtrasados = datosFull.filter(item => {
                const fechaIngreso = new Date(item.fecha);
                const diff = (ahora - fechaIngreso) / (1000 * 60 * 60);
                return item.estado === 'Pendiente' && diff >= 24;
            });
            const badge = document.getElementById('badgeNotif');
            if (reclamosAtrasados.length > 0) {
                badge.innerText = reclamosAtrasados.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function mostrarAlertas() {
            if (reclamosAtrasados.length === 0) {
                alert("Sin reclamos críticos.");
                return;
            }
            showView('alertas_list');
        }

        async function showView(view, filterValue = null) {
            const frame = document.getElementById('contentFrame');
            const title = document.getElementById('viewTitle');
            frame.className = "flex-1 overflow-y-auto p-4 md:p-10";
            
            if (view === 'home') {
                frame.classList.add('hero-bg', 'flex', 'items-center', 'justify-center');
                title.innerText = "Inicio";
                frame.innerHTML = `
                    <div class="text-center space-y-4 w-full max-w-sm md:max-w-xl bg-white/70 backdrop-blur-xl p-8 md:p-16 rounded-[2rem] md:rounded-[4rem] shadow-2xl border border-white">
                        <i data-lucide="truck" class="w-12 h-12 md:w-20 md:h-20 text-ocasa-cyan mx-auto mb-4"></i>
                        <h1 class="text-xl md:text-4xl font-black text-slate-800 uppercase tracking-tighter">Gestión de Reclamos</h1>
                        <p class="text-xs md:text-base text-slate-600 font-medium italic">Seleccione una operación en el menú para comenzar.</p>
                    </div>`;
            } 

            else if (view === 'stats') {
                title.innerText = "Estadísticas";
                const total = datosFull.length;
                const pendientes = datosFull.filter(d => d.estado === 'Pendiente').length;
                const finalizados = total - pendientes;
                const porc = total > 0 ? Math.round((finalizados/total)*100) : 0;
                
                frame.innerHTML = `
                    <div class="max-w-4xl mx-auto space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                <p class="text-[10px] font-bold text-slate-400 uppercase">Total Reclamos</p>
                                <p class="text-4xl font-black text-slate-800">${total}</p>
                            </div>
                            <div onclick="showView('historico', 'Pendiente')" class="bg-white p-6 rounded-3xl border border-orange-100 shadow-sm text-orange-500 cursor-pointer hover:bg-orange-50 transition-colors">
                                <div class="flex justify-between items-start">
                                    <p class="text-[10px] font-bold uppercase">Pendientes</p>
                                    <i data-lucide="arrow-up-right" class="w-4 h-4 opacity-50"></i>
                                </div>
                                <p class="text-4xl font-black">${pendientes}</p>
                                <p class="text-[9px] mt-2 font-bold uppercase underline">Ver listado filtrado</p>
                            </div>
                            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-emerald-500">
                                <p class="text-[10px] font-bold uppercase">SLA Objetivo</p>
                                <p class="text-4xl font-black">${porc}%</p>
                            </div>
                        </div>
                    </div>`;
            }

            else if (view === 'carga') {
                title.innerText = "Nueva Carga";
                frame.innerHTML = `
                    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
                        <form id="formCarga" class="space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Tipo</label>
                                    <select id="f-tipo" class="w-full p-4 rounded-xl bg-slate-50 border border-slate-100 font-bold">
                                        <option>Caja rota</option><option>Producto equivocado</option><option>No recibí producto</option>
                                    </select>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Prioridad</label>
                                    <select id="f-prioridad" class="w-full p-4 rounded-xl bg-slate-50 border border-slate-100 font-bold">
                                        <option value="Baja">Baja</option><option value="Alta">Alta</option>
                                    </select>
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">N° Remito</label>
                                <input type="text" id="f-remito" required class="w-full p-4 rounded-xl bg-slate-50 border border-slate-100 font-bold outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Detalle</label>
                                <textarea id="f-desc" rows="3" required class="w-full p-4 rounded-xl bg-slate-50 border border-slate-100"></textarea>
                            </div>
                            <button type="submit" class="w-full bg-ocasa-cyan text-white py-5 rounded-2xl font-black uppercase text-sm shadow-xl active:scale-95 transition-all">Sincronizar</button>
                        </form>
                    </div>`;
                
                document.getElementById('formCarga').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = e.target.querySelector('button');
                    btn.disabled = true; btn.innerText = "Sincronizando...";
                    const payload = {
                        fecha: new Date().toLocaleString(),
                        tipo: document.getElementById('f-tipo').value,
                        remito: document.getElementById('f-remito').value,
                        descripcion: document.getElementById('f-desc').value,
                        prioridad: document.getElementById('f-prioridad').value,
                        estado: "Pendiente", usuario: "Gonzalo Dorrego"
                    };
                    await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    alert("¡Sincronizado!"); 
                    init();
                });
            }

            else if (view === 'historico') {
                title.innerText = filterValue ? `Historial: ${filterValue}s` : "Historial Completo";
                frame.innerHTML = `
                    <div class="space-y-4 max-w-6xl mx-auto">
                        <div class="flex flex-col md:flex-row gap-4 justify-between bg-white p-4 rounded-2xl border border-slate-100">
                            <input type="text" id="searchTable" oninput="filtrarTabla()" placeholder="Buscar remito..." class="p-3 bg-slate-50 w-full md:w-64 border border-slate-100 rounded-xl text-sm outline-none">
                            <div class="flex gap-2">
                                ${filterValue ? `<button onclick="showView('historico')" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl font-bold text-[10px] uppercase border border-red-100">Quitar Filtro</button>` : ''}
                                <button onclick="exportarCSV()" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase">Exportar CSV</button>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl border border-slate-200 overflow-x-auto shadow-sm italic">
                            <table class="w-full text-left min-w-[600px]">
                                <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                    <tr><th class="p-4">Remito</th><th class="p-4">Tipo</th><th class="p-4">Fecha</th><th class="p-4">Estado</th></tr>
                                </thead>
                                <tbody id="tablaBody" class="text-sm"></tbody>
                            </table>
                        </div>
                    </div>`;
                
                const datosAMostrar = filterValue ? datosFull.filter(d => d.estado === filterValue) : datosFull;
                renderizarTabla(datosAMostrar);
            }
            lucide.createIcons();
        }

        function renderizarTabla(data) {
            const tbody = document.getElementById('tablaBody');
            if(!tbody) return;
            tbody.innerHTML = data.map(item => `
                <tr class="border-t border-slate-50 ${item.prioridad === 'Alta' ? 'priority-high' : ''}">
                    <td class="p-4 font-black text-slate-800">${item.remito}</td>
                    <td class="p-4 text-slate-600 font-bold">${item.tipo}</td>
                    <td class="p-4 text-[11px] text-slate-400 uppercase">${item.fecha}</td>
                    <td class="p-4">
                        <span class="px-3 py-1 ${item.estado === 'Pendiente' ? 'bg-orange-50 text-orange-500 border-orange-100' : 'bg-cyan-50 text-ocasa-cyan border-cyan-100'} rounded-full text-[9px] font-black uppercase tracking-widest border">
                            ${item.estado}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function filtrarTabla() {
            const term = document.getElementById('searchTable').value.toLowerCase();
            const filtrados = datosFull.filter(d => d.remito.toLowerCase().includes(term));
            renderizarTabla(filtrados);
        }

        async function init() {
            try {
                const res = await fetch(WEB_APP_URL);
                datosFull = await res.json();
                procesarAlertas();
            } catch (e) { console.error("Error al cargar datos"); }
            showView('home');
        }
        init();
    </script>
</body>
</html>
