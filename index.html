<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCASA - Gestión de Reclamos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ocasa-cyan: #0097A7; }
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; overflow: hidden; }
        .bg-ocasa-cyan { background-color: var(--ocasa-cyan); }
        .text-ocasa-cyan { color: var(--ocasa-cyan); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--ocasa-cyan); border-radius: 10px; }
        
        .menu-item { transition: all 0.2s ease; border-radius: 12px; }
        .menu-item:hover { background-color: #f1f5f9; color: var(--ocasa-cyan); }
        
        /* Animación para el desplegable */
        #submenuCarga { transition: max-height 0.3s ease-out; overflow: hidden; max-height: 0; }
        #submenuCarga.open { max-height: 200px; }
    </style>
</head>
<body class="h-screen flex">

    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col z-50">
        <div class="p-8 border-b border-slate-100 flex flex-col items-center">
            <img src="logo_ocasa.png" alt="OCASA" class="max-w-[150px] mb-2">
            <span class="text-[10px] text-slate-400 font-black tracking-widest uppercase">Logística Integral</span>
        </div>
        
        <nav class="flex-1 p-4 space-y-2">
            <div>
                <button onclick="toggleSubmenu()" class="w-full flex items-center justify-between px-4 py-4 bg-ocasa-cyan text-white rounded-2xl font-bold shadow-lg shadow-cyan-500/20 active:scale-95 transition-transform">
                    <div class="flex items-center gap-3">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i>
                        <span class="text-sm">NUEVO</span>
                    </div>
                    <i data-lucide="chevron-down" class="w-4 h-4" id="chevronIcon"></i>
                </button>
                
                <div id="submenuCarga" class="bg-slate-50 mt-2 rounded-xl border border-slate-100">
                    <button onclick="abrirModalCarga()" class="w-full text-left px-5 py-3 text-xs font-bold text-slate-600 hover:text-ocasa-cyan flex items-center gap-2">
                        <i data-lucide="file-plus" class="w-4 h-4"></i>
                        CARGAR NUEVO RECLAMO
                    </button>
                </div>
            </div>

            <button onclick="location.reload()" class="w-full flex items-center gap-3 px-4 py-4 menu-item text-slate-500 font-bold">
                <i data-lucide="history" class="w-5 h-5"></i>
                <span class="text-sm uppercase">Histórico de Reclamos</span>
            </button>
        </nav>

        <div class="p-6 border-t border-slate-100 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-black text-ocasa-cyan border border-slate-200 text-xs">GD</div>
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-900">Gonzalo Dorrego</span>
                <span class="text-[9px] text-slate-400 uppercase font-black">Admin Sistema</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-24 bg-white border-b border-slate-100 px-10 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-4">
                <span class="w-1.5 h-8 bg-ocasa-cyan rounded-full"></span>
                <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Historial Operativo</h2>
            </div>

            <div class="flex items-center gap-3">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-4 top-3 text-slate-400 w-4 h-4"></i>
                    <input type="text" id="inputBuscar" placeholder="Buscar por ID, Remito o Detalle..." 
                           class="w-96 bg-slate-100 border border-slate-200 rounded-full py-3 pl-12 pr-6 text-sm outline-none focus:ring-2 focus:ring-cyan-100 focus:bg-white transition-all">
                </div>
                <button onclick="filtrarReclamos()" class="bg-slate-900 text-white px-8 py-3 rounded-full font-bold text-xs uppercase hover:bg-black transition-all active:scale-95 shadow-md">
                    Buscar
                </button>
            </div>

            <div class="text-right">
                <span id="reloj" class="text-sm font-black text-slate-700 block">00:00:00</span>
                <span class="text-[9px] text-emerald-500 font-black uppercase tracking-widest">Estado: Sincronizado</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-10 bg-slate-50 custom-scroll">
            <div class="max-w-6xl mx-auto">
                <div class="bg-white rounded-[2rem] shadow-xl border border-slate-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase">Fecha</th>
                                <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase">ID / Remito</th>
                                <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase">Tipo</th>
                                <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase">Descripción</th>
                                <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla" class="text-sm">
                            </tbody>
                    </table>
                    <div id="loader" class="p-20 text-center flex flex-col items-center gap-4">
                        <div class="animate-spin rounded-full h-8 w-8 border-4 border-slate-200 border-t-cyan-600"></div>
                        <span class="text-xs font-bold text-slate-400 uppercase">Cargando base de datos...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="modalCarga" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="font-black text-lg text-slate-800 uppercase tracking-tighter">Nueva Carga de Reclamo</h3>
                <button onclick="cerrarModalCarga()" class="p-2 hover:bg-slate-200 rounded-full transition-colors"><i data-lucide="x" class="w-6 h-6 text-slate-400"></i></button>
            </div>
            
            <form id="formReclamo" class="p-10 space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Tipo de Reclamo</label>
                        <select id="tipo" required class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none font-bold text-slate-700">
                            <option value="Caja rota">Caja rota / Dañada</option>
                            <option value="Producto equivocado">Producto equivocado</option>
                            <option value="No recibí producto">No recibí mi producto</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">N° Remito</label>
                        <input type="text" id="remito" required placeholder="0000-000000" class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none font-bold text-slate-700">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Descripción</label>
                    <textarea id="descripcion" rows="3" required class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none text-slate-700 font-medium"></textarea>
                </div>
                <button type="submit" id="btnEnviar" class="w-full bg-ocasa-cyan text-white py-5 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all">REGISTRAR EN PLANILLA</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxs6-28lVAXxzHRSCRVMijfUlJ7IWtImxlhatT1GNA4U3OLmx2A-E5eZXekfX1hrvxARQ/exec';
        let datosFull = [];

        // Reloj
        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);

        // Lógica del Desplegable Lateral
        function toggleSubmenu() {
            document.getElementById('submenuCarga').classList.toggle('open');
            document.getElementById('chevronIcon').classList.toggle('rotate-180');
        }

        // Modales
        function abrirModalCarga() { document.getElementById('modalCarga').classList.remove('hidden'); }
        function cerrarModalCarga() { document.getElementById('modalCarga').classList.add('hidden'); }

        // Cargar Historial al Inicio
        async function cargarDatos() {
            try {
                const res = await fetch(WEB_APP_URL);
                datosFull = await res.json();
                renderizarTabla(datosFull);
                document.getElementById('loader').classList.add('hidden');
            } catch (e) { console.error("Error", e); }
        }

        function renderizarTabla(data) {
            const tbody = document.getElementById('cuerpoTabla');
            tbody.innerHTML = '';
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-50 hover:bg-slate-50/50 transition-colors";
                tr.innerHTML = `
                    <td class="px-8 py-5 text-slate-400 font-medium text-xs">${item.fecha || '-'}</td>
                    <td class="px-8 py-5 font-black text-slate-800 tracking-tight">${item.remito || '-'}</td>
                    <td class="px-8 py-5 font-bold text-slate-600">${item.tipo || '-'}</td>
                    <td class="px-8 py-5 text-slate-500 italic max-w-xs truncate">${item.descripcion || '-'}</td>
                    <td class="px-8 py-5"><span class="px-3 py-1 bg-cyan-50 text-ocasa-cyan rounded-full text-[10px] font-black uppercase">${item.estado || 'PENDIENTE'}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Buscador
        function filtrarReclamos() {
            const query = document.getElementById('inputBuscar').value.toLowerCase();
            const filtrados = datosFull.filter(i => 
                i.remito.toLowerCase().includes(query) || 
                i.descripcion.toLowerCase().includes(query) || 
                i.tipo.toLowerCase().includes(query)
            );
            renderizarTabla(filtrados);
        }

        // Envío de Formulario
        document.getElementById('formReclamo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";
            
            const payload = {
                fecha: new Date().toLocaleString(),
                tipo: document.getElementById('tipo').value,
                remito: document.getElementById('remito').value,
                descripcion: document.getElementById('descripcion').value,
                estado: "Pendiente",
                usuario: "Gonzalo Dorrego"
            };

            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Reclamo guardado con éxito");
            location.reload();
        });

        cargarDatos();
    </script>
</body>
</html>
