<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCASA - Gestión de Reclamos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Color · Primarios */
            --ocasa-calypso: #0099A8;
            --ocasa-calypso-dark: #056572;
            --ocasa-calypso-light: #E0F4F5;
            --ocasa-navy: #002639;

            /* Color · Semánticos */
            --ocasa-success: #8FBF4C;
            --ocasa-warning: #FFAB40;
            --ocasa-danger: #D64045;

            /* Color · Neutros */
            --ocasa-bg: #F5F5F5;
            --ocasa-surface: #FFFFFF;
            --ocasa-surface-alt: #EEEDEB;
            --ocasa-border: #D6E2E5;
            --ocasa-text-1: #1E2D32;
            --ocasa-text-2: #4A6670;
            --ocasa-text-3: #7A959E;

            /* Tipografía */
            --ocasa-font: 'Montserrat', sans-serif;

            /* Radios */
            --ocasa-radius-sm: 3px;
            --ocasa-radius-md: 5px;
            --ocasa-radius-lg: 6px;
            --ocasa-radius-xl: 8px;

            /* Espaciado */
            --ocasa-space-xs: 4px;
            --ocasa-space-sm: 8px;
            --ocasa-space-md: 16px;
            --ocasa-space-lg: 24px;
            --ocasa-space-xl: 32px;
            --ocasa-space-2xl: 48px;
            --ocasa-space-3xl: 64px;
        }

        /* ── FIX: clases custom que Tailwind CDN no puede resolver ── */
        .bg-ocasa-surface      { background-color: var(--ocasa-surface) !important; }
        .bg-ocasa-surface-alt  { background-color: var(--ocasa-surface-alt) !important; }
        .bg-ocasa-calypso      { background-color: var(--ocasa-calypso) !important; }
        .bg-ocasa-navy         { background-color: var(--ocasa-navy) !important; }
        .bg-ocasa-bg           { background-color: var(--ocasa-bg) !important; }

        .text-ocasa-text-1     { color: var(--ocasa-text-1) !important; }
        .text-ocasa-text-2     { color: var(--ocasa-text-2) !important; }
        .text-ocasa-text-3     { color: var(--ocasa-text-3) !important; }
        .text-ocasa-calypso    { color: var(--ocasa-calypso) !important; }
        .text-ocasa-danger     { color: var(--ocasa-danger) !important; }
        .text-ocasa-warning    { color: var(--ocasa-warning) !important; }

        .border-ocasa-border   { border-color: var(--ocasa-border) !important; }
        .border-ocasa-danger   { border-color: var(--ocasa-danger) !important; }

        .hover\:bg-ocasa-surface-alt:hover { background-color: var(--ocasa-surface-alt) !important; }
        .hover\:text-ocasa-calypso:hover   { color: var(--ocasa-calypso) !important; }
        /* ─────────────────────────────────────────────────────────── */

        body {
            font-family: var(--ocasa-font);
            background-color: var(--ocasa-bg);
            color: var(--ocasa-text-1);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background-color: var(--ocasa-calypso);
            z-index: 300;
            pointer-events: none;
        }

        body { padding-top: 6px; }

        @keyframes bell-swing {
            0%   { transform: rotate(0); }
            15%  { transform: rotate(15deg); }
            30%  { transform: rotate(-15deg); }
            45%  { transform: rotate(10deg); }
            60%  { transform: rotate(-10deg); }
            75%  { transform: rotate(0); }
            100% { transform: rotate(0); }
        }

        .animate-bell svg {
            animation: bell-swing 2s infinite;
            color: var(--ocasa-danger) !important;
        }

        #notifPanel {
            display: none;
            position: absolute;
            top: 65px;
            right: 0;
            width: 320px;
            max-height: 480px;
            background: var(--ocasa-surface);
            border-radius: var(--ocasa-radius-xl);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            z-index: 200;
            border: 1px solid var(--ocasa-border);
        }

        #notifPanel.show {
            display: block;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #sidebar { transition: transform 0.3s ease; z-index: 100; }

        @media (max-width: 768px) {
            #sidebar {
                transform: translateX(-100%);
                position: fixed;
                height: 100vh;
            }
            #sidebar.open { transform: translateX(0); }
            #overlay.show {
                display: block;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 90;
            }
        }

        #menuContent {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        #menuContent.open { max-height: 500px; }

        .menu-link {
            display: flex;
            align-items: center;
            gap: var(--ocasa-space-md);
            padding: var(--ocasa-space-md) var(--ocasa-space-lg);
            border-radius: var(--ocasa-radius-lg);
            font-size: 11px;
            font-weight: 700;
            color: var(--ocasa-text-3);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .menu-link:hover {
            background-color: var(--ocasa-surface-alt);
            color: var(--ocasa-calypso);
        }

        .hero-bg {
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)),
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        #overlay { display: none; }

        .custom-scrollbar::-webkit-scrollbar       { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track  { background: var(--ocasa-surface-alt); }
        .custom-scrollbar::-webkit-scrollbar-thumb  { background: var(--ocasa-border); border-radius: var(--ocasa-radius-xl); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--ocasa-calypso); }

        .status-positivo  { background-color: rgba(143,191,76,0.15); color: #5a7d2f; border: 1px solid rgba(143,191,76,0.3); }
        .status-importante{ background-color: rgba(0,153,168,0.12); color: var(--ocasa-calypso-dark); border: 1px solid rgba(0,153,168,0.2); }
        .status-atencion  { background-color: rgba(255,171,64,0.18); color: #d97a26; border: 1px solid rgba(255,171,64,0.3); }
        .status-critico   { background-color: rgba(214,64,69,0.12); color: var(--ocasa-danger); border: 1px solid rgba(214,64,69,0.2); }

        .row-marked {
            background-color: rgba(214,64,69,0.06) !important;
            border-left: 3px solid var(--ocasa-danger) !important;
        }

        /* Notif card clickeable */
        .notif-card {
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .notif-card:hover { opacity: 0.85; }

        /* Chart containers */
        .chart-card {
            background: var(--ocasa-surface);
            border: 1px solid var(--ocasa-border);
            border-radius: var(--ocasa-radius-lg);
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .chart-label {
            font-size: 10px;
            font-weight: 900;
            color: var(--ocasa-text-3);
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: 0.06em;
            margin-bottom: 16px;
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <div id="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="w-72 bg-ocasa-surface border-r border-ocasa-border flex flex-col shrink-0">
        <div class="p-8 border-b border-ocasa-border flex flex-col items-center">
            <img src="logo_ocasa.png" alt="OCASA" class="max-w-[140px] mb-2 cursor-pointer" onclick="showView('home')">
            <span class="text-[10px] text-ocasa-text-3 font-black tracking-widest uppercase italic">Logística Global</span>
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <button onclick="toggleMenu()" class="w-full flex items-center justify-between px-6 py-4 bg-ocasa-calypso text-white rounded-lg font-bold shadow-lg active:scale-95 transition-all" style="border-radius: var(--ocasa-radius-xl);">
                <div class="flex items-center gap-3">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                    <span class="text-sm tracking-tight uppercase">Menú Principal</span>
                </div>
                <i data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-300" id="menuChevron"></i>
            </button>

            <div id="menuContent" class="mt-2 space-y-1 bg-ocasa-surface-alt rounded-lg p-2 border border-ocasa-border" style="border-radius: var(--ocasa-radius-lg);">
                <button onclick="showView('carga'); toggleSidebar();" class="menu-link w-full" style="border-radius: var(--ocasa-radius-md);"><i data-lucide="file-plus" class="w-4 h-4"></i> Cargar Reclamo</button>
                <button onclick="showView('historico'); toggleSidebar();" class="menu-link w-full" style="border-radius: var(--ocasa-radius-md);"><i data-lucide="history" class="w-4 h-4"></i> Histórico</button>
                <button onclick="showView('stats'); toggleSidebar();" class="menu-link w-full" style="border-radius: var(--ocasa-radius-md);"><i data-lucide="pie-chart" class="w-4 h-4"></i> Dashboard</button>
            </div>
        </nav>

        <div class="p-6 border-t border-ocasa-border flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-ocasa-surface-alt flex items-center justify-center font-bold text-ocasa-calypso border border-ocasa-border text-xs" style="border-radius: var(--ocasa-radius-xl);">GD</div>
            <div class="flex flex-col">
                <span class="text-xs font-bold leading-tight text-ocasa-text-1">Gonzalo Dorrego</span>
                <span class="text-[9px] text-ocasa-text-3 uppercase font-bold tracking-tighter">Admin Sistema</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-ocasa-surface relative">
        <header class="h-16 md:h-20 bg-ocasa-surface border-b border-ocasa-border px-6 md:px-10 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden p-2 text-ocasa-text-2"><i data-lucide="menu"></i></button>
                <span class="hidden md:block w-1.5 h-6 bg-ocasa-calypso rounded-full"></span>
                <h2 id="viewTitle" class="text-sm md:text-lg font-black text-ocasa-text-1 uppercase italic tracking-tighter">Panel de Gestión</h2>
            </div>

            <div class="relative">
                <button onclick="toggleNotificaciones()" id="btnBell" class="p-2 rounded-full hover:bg-ocasa-surface-alt transition-all relative" style="border-radius: var(--ocasa-radius-lg);">
                    <div id="bellWrapper"><i data-lucide="bell" class="w-6 h-6 text-ocasa-text-3"></i></div>
                    <span id="badgeNotif" class="hidden absolute top-0 right-0 bg-ocasa-danger text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-ocasa-surface" style="border-radius: var(--ocasa-radius-xl);">0</span>
                </button>

                <div id="notifPanel">
                    <div class="p-4 border-b border-ocasa-border bg-ocasa-surface-alt flex justify-between items-center" style="border-radius: var(--ocasa-radius-xl) var(--ocasa-radius-xl) 0 0;">
                        <span class="text-[10px] font-black uppercase text-ocasa-text-3 italic">Alertas SLA (+24hs)</span>
                        <span id="notifCount" class="bg-ocasa-danger text-white text-[9px] px-2 py-0.5 rounded-full font-bold" style="border-radius: var(--ocasa-radius-sm);">0</span>
                    </div>
                    <div id="notifList" class="overflow-y-auto max-h-[350px] p-2 space-y-2"></div>
                </div>
            </div>
        </header>

        <div id="contentFrame" class="flex-1 overflow-y-auto p-4 md:p-10"></div>
    </main>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby6ZbP0Zs6AkB4CxinKNsGW6wC11VB0PYGbLOhe7cY_iFVDsfWYfd1c3PFPN3ghfKw0pw/exec';
        let datosFull = [];
        let reclamosAtrasados = [];
        let activeCharts = [];

        function destroyCharts() {
            activeCharts.forEach(c => c.destroy());
            activeCharts = [];
        }

        function toggleSidebar() {
            if (window.innerWidth >= 768) return;
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function toggleMenu() {
            document.getElementById('menuContent').classList.toggle('open');
            document.getElementById('menuChevron').classList.toggle('rotate-180');
        }

        function toggleNotificaciones() {
            document.getElementById('notifPanel').classList.toggle('show');
        }

        window.addEventListener('click', (e) => {
            if (!document.getElementById('btnBell').contains(e.target) && !document.getElementById('notifPanel').contains(e.target)) {
                document.getElementById('notifPanel').classList.remove('show');
            }
        });

        function procesarAlertas() {
            const ahora = new Date();
            reclamosAtrasados = datosFull.filter(item => {
                const fechaIngreso = new Date(item.fecha);
                const diff = (ahora - fechaIngreso) / (1000 * 60 * 60);
                return item.estado === 'Pendiente' && diff >= 24;
            });

            const badge   = document.getElementById('badgeNotif');
            const wrapper = document.getElementById('bellWrapper');
            const list    = document.getElementById('notifList');
            const count   = document.getElementById('notifCount');

            if (reclamosAtrasados.length > 0) {
                badge.innerText = reclamosAtrasados.length;
                badge.classList.remove('hidden');
                wrapper.classList.add('animate-bell');
                count.innerText = reclamosAtrasados.length;

                // FIX: card completa es clickeable y lleva a historial filtrado por Pendiente
                list.innerHTML = reclamosAtrasados.map(r => `
                    <div class="notif-card p-4 bg-ocasa-surface border border-ocasa-border rounded-lg shadow-sm"
                         style="border-left: 4px solid var(--ocasa-danger); border-radius: var(--ocasa-radius-lg);"
                         onclick="verReclamo('${r.remito}')">
                        <p style="font-size:11px; font-weight:900; color:var(--ocasa-text-1); text-transform:uppercase; font-style:italic;">${r.tipo}</p>
                        <p style="font-size:10px; color:var(--ocasa-text-3); font-weight:700; margin-top:4px;">Guía: ${r.remito}</p>
                        <div class="flex justify-between items-center" style="margin-top:12px;">
                            <span style="font-size:9px; color:var(--ocasa-danger); font-weight:700; text-transform:uppercase; font-style:italic;">Vencido</span>
                            <span style="background:var(--ocasa-navy); color:#fff; font-size:9px; padding:4px 10px; border-radius:var(--ocasa-radius-md); font-weight:900; text-transform:uppercase;">Ver →</span>
                        </div>
                    </div>`).join('');
            } else {
                badge.classList.add('hidden');
                wrapper.classList.remove('animate-bell');
                list.innerHTML = `<p class="p-8 text-center text-ocasa-text-3 text-xs font-bold italic">Todo al día</p>`;
            }
        }

        function verReclamo(remito) {
            document.getElementById('notifPanel').classList.remove('show');
            showView('historico', remito);
        }

        async function showView(view, filter = null) {
            destroyCharts();
            const frame = document.getElementById('contentFrame');
            const title = document.getElementById('viewTitle');
            frame.className = "flex-1 overflow-y-auto p-4 md:p-10";

            if (view === 'home') {
                frame.classList.add('hero-bg', 'flex', 'items-center', 'justify-center');
                title.innerText = "Inicio";
                frame.innerHTML = `<div class="text-center p-10 rounded-lg shadow-2xl border w-full max-w-lg" style="background:rgba(255,255,255,0.88); backdrop-filter:blur(8px); border-radius:var(--ocasa-radius-xl); border-color:var(--ocasa-border);">
                    <i data-lucide="package" class="w-16 h-16 mx-auto mb-4" style="color:var(--ocasa-calypso);"></i>
                    <h1 class="text-3xl font-black uppercase italic tracking-tighter" style="color:var(--ocasa-text-1);">OCASA Logística</h1>
                </div>`;
            }

            else if (view === 'carga') {
                title.innerText = "Nueva Carga";
                frame.innerHTML = `
                    <div class="max-w-xl mx-auto rounded-lg shadow-xl p-8 border" style="background:var(--ocasa-surface); border-color:var(--ocasa-border); border-radius:var(--ocasa-radius-xl);">
                        <form id="formCarga" class="space-y-4">
                            <div class="space-y-1">
                                <label style="font-size:10px; font-weight:900; color:var(--ocasa-text-3); text-transform:uppercase; font-style:italic; margin-left:8px; display:block;">Tipo de reclamo</label>
                                <select id="f-tipo" class="w-full p-4 rounded border font-bold" style="background:var(--ocasa-surface-alt); border-color:var(--ocasa-border); color:var(--ocasa-text-1); border-radius:var(--ocasa-radius-md);">
                                    <option>Caja rota</option><option>Producto equivocado</option><option>No recibí producto</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label style="font-size:10px; font-weight:900; color:var(--ocasa-text-3); text-transform:uppercase; font-style:italic; margin-left:8px; display:block;">Remito</label>
                                <input type="text" id="f-remito" required class="w-full p-4 rounded border font-black outline-none" style="background:var(--ocasa-surface-alt); border-color:var(--ocasa-border); color:var(--ocasa-text-1); border-radius:var(--ocasa-radius-md);">
                            </div>
                            <div class="space-y-1">
                                <label style="font-size:10px; font-weight:900; color:var(--ocasa-text-3); text-transform:uppercase; font-style:italic; margin-left:8px; display:block;">Prioridad</label>
                                <select id="f-prioridad" class="w-full p-4 rounded border font-bold" style="background:var(--ocasa-surface-alt); border-color:var(--ocasa-border); color:var(--ocasa-text-1); border-radius:var(--ocasa-radius-md);">
                                    <option>Baja</option><option>Media</option><option>Alta</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label style="font-size:10px; font-weight:900; color:var(--ocasa-text-3); text-transform:uppercase; font-style:italic; margin-left:8px; display:block;">Descripción</label>
                                <textarea id="f-descripcion" required class="w-full p-4 rounded border font-medium outline-none h-24" style="background:var(--ocasa-surface-alt); border-color:var(--ocasa-border); color:var(--ocasa-text-1); border-radius:var(--ocasa-radius-md);"></textarea>
                            </div>
                            <button type="submit" class="w-full py-5 rounded font-black uppercase text-sm shadow-xl active:scale-95 transition-all mt-4 tracking-widest text-white" style="background:var(--ocasa-calypso); border-radius:var(--ocasa-radius-lg);">Sincronizar Reclamo</button>
                        </form>
                    </div>`;

                document.getElementById('formCarga').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = e.target.querySelector('button');
                    btn.disabled = true; btn.innerText = "Enviando...";
                    const payload = {
                        fecha: new Date().toISOString(),
                        tipo: document.getElementById('f-tipo').value,
                        remito: document.getElementById('f-remito').value,
                        prioridad: document.getElementById('f-prioridad').value,
                        descripcion: document.getElementById('f-descripcion').value,
                        estado: "Pendiente", usuario: "Gonzalo Dorrego"
                    };
                    await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    alert("¡Cargado!");
                    init();
                });
            }

            else if (view === 'historico') {
                title.innerText = filter ? `Búsqueda: ${filter}` : "Historial General";
                frame.innerHTML = `
                    <div class="max-w-6xl mx-auto space-y-4">
                        <div class="p-4 rounded-lg flex justify-between items-center shadow-sm border" style="background:var(--ocasa-surface); border-color:var(--ocasa-border); border-radius:var(--ocasa-radius-lg);">
                            <input type="text" id="searchTable" oninput="filtrarTabla()" placeholder="Buscar en todos los campos..."
                                class="p-3 rounded border text-sm w-64 outline-none"
                                style="background:var(--ocasa-surface-alt); border-color:var(--ocasa-border); color:var(--ocasa-text-1); border-radius:var(--ocasa-radius-md);"
                                value="${filter || ''}">
                            ${filter ? `<button onclick="showView('historico')" class="text-[9px] font-black px-4 py-2 rounded border uppercase italic" style="color:var(--ocasa-danger); background:rgba(214,64,69,0.1); border-color:rgba(214,64,69,0.2); border-radius:var(--ocasa-radius-md);">Limpiar</button>` : ''}
                        </div>
                        <div class="rounded-lg border overflow-hidden shadow-sm" style="background:var(--ocasa-surface); border-color:var(--ocasa-border); border-radius:var(--ocasa-radius-lg);">
                            <div class="overflow-x-auto custom-scrollbar">
                                <table class="w-full text-left min-w-[1000px]">
                                    <thead style="background:var(--ocasa-navy); color:#fff; font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:0.05em;">
                                        <tr>
                                            <th class="p-4">Fecha</th>
                                            <th class="p-4">Remito</th>
                                            <th class="p-4">Tipo</th>
                                            <th class="p-4">Prioridad</th>
                                            <th class="p-4">Descripción</th>
                                            <th class="p-4">Resolución</th>
                                            <th class="p-4 text-right">Estado</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tablaBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>`;

                let data = datosFull;
                if (filter === 'Pendiente') {
                    data = datosFull.filter(d => d.estado === 'Pendiente');
                } else if (filter) {
                    const term = filter.toLowerCase();
                    data = datosFull.filter(d =>
                        Object.values(d).some(val => val.toString().toLowerCase().includes(term))
                    );
                }
                renderizarTabla(data);
            }

            else if (view === 'stats') {
                title.innerText = "Dashboard";

                const total      = datosFull.length;
                const pendientes = datosFull.filter(d => d.estado === 'Pendiente').length;
                const resueltos  = total - pendientes;

                const prioCount = { Alta: 0, Media: 0, Baja: 0 };
                const tipoCount = {};
                const estadoCount = {};

                datosFull.forEach(d => {
                    const p = d.prioridad || 'Baja';
                    if (prioCount[p] !== undefined) prioCount[p]++;

                    const t = d.tipo || 'Sin tipo';
                    tipoCount[t] = (tipoCount[t] || 0) + 1;

                    const e = d.estado || 'Sin estado';
                    estadoCount[e] = (estadoCount[e] || 0) + 1;
                });

                frame.innerHTML = `
                <div class="max-w-5xl mx-auto space-y-6">

                    <!-- KPIs -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div onclick="showView('historico')" class="chart-card cursor-pointer transition-opacity hover:opacity-80">
                            <p class="chart-label">Total</p>
                            <p style="font-size:52px; font-weight:900; color:var(--ocasa-text-1); line-height:1;">${total}</p>
                        </div>
                        <div onclick="showView('historico','Pendiente')" class="chart-card cursor-pointer transition-opacity hover:opacity-80" style="border-left: 4px solid var(--ocasa-warning);">
                            <p class="chart-label" style="color:var(--ocasa-warning);">Pendientes ›</p>
                            <p style="font-size:52px; font-weight:900; color:var(--ocasa-text-1); line-height:1;">${pendientes}</p>
                        </div>
                        <div class="chart-card" style="border-left: 4px solid var(--ocasa-success);">
                            <p class="chart-label" style="color:#5a7d2f;">Resueltos</p>
                            <p style="font-size:52px; font-weight:900; color:var(--ocasa-text-1); line-height:1;">${resueltos}</p>
                        </div>
                        <div class="chart-card" style="border-left: 4px solid var(--ocasa-danger);">
                            <p class="chart-label" style="color:var(--ocasa-danger);">Alta Prioridad</p>
                            <p style="font-size:52px; font-weight:900; color:var(--ocasa-text-1); line-height:1;">${prioCount.Alta}</p>
                        </div>
                    </div>

                    <!-- Gráficos fila 1 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="chart-card">
                            <p class="chart-label">Estado de Reclamos</p>
                            <div style="max-height:220px; display:flex; justify-content:center;">
                                <canvas id="chartEstado"></canvas>
                            </div>
                        </div>
                        <div class="chart-card">
                            <p class="chart-label">Prioridad</p>
                            <div style="max-height:220px; display:flex; justify-content:center;">
                                <canvas id="chartPrio"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Gráfico fila 2: por tipo (barra horizontal) -->
                    <div class="chart-card">
                        <p class="chart-label">Reclamos por Tipo</p>
                        <canvas id="chartTipo" style="max-height:220px;"></canvas>
                    </div>

                </div>`;

                setTimeout(() => {
                    const chartFont = { family: 'Montserrat', weight: '700' };

                    // Donut: estados
                    const ctxE = document.getElementById('chartEstado');
                    if (ctxE) {
                        activeCharts.push(new Chart(ctxE, {
                            type: 'doughnut',
                            data: {
                                labels: Object.keys(estadoCount),
                                datasets: [{
                                    data: Object.values(estadoCount),
                                    backgroundColor: ['#FFAB40','#8FBF4C','#0099A8','#D64045','#7A959E'],
                                    borderWidth: 0,
                                    hoverOffset: 6
                                }]
                            },
                            options: {
                                cutout: '65%',
                                plugins: {
                                    legend: {
                                        position: 'bottom',
                                        labels: { font: chartFont, padding: 14, boxWidth: 12 }
                                    }
                                }
                            }
                        }));
                    }

                    // Donut: prioridades
                    const ctxP = document.getElementById('chartPrio');
                    if (ctxP) {
                        activeCharts.push(new Chart(ctxP, {
                            type: 'doughnut',
                            data: {
                                labels: ['Alta','Media','Baja'],
                                datasets: [{
                                    data: [prioCount.Alta, prioCount.Media, prioCount.Baja],
                                    backgroundColor: ['#D64045','#FFAB40','#8FBF4C'],
                                    borderWidth: 0,
                                    hoverOffset: 6
                                }]
                            },
                            options: {
                                cutout: '65%',
                                plugins: {
                                    legend: {
                                        position: 'bottom',
                                        labels: { font: chartFont, padding: 14, boxWidth: 12 }
                                    }
                                }
                            }
                        }));
                    }

                    // Barra horizontal: por tipo
                    const ctxT = document.getElementById('chartTipo');
                    if (ctxT) {
                        const tipos  = Object.keys(tipoCount);
                        const counts = Object.values(tipoCount);
                        const palette = ['#0099A8','#002639','#8FBF4C','#FFAB40','#D64045','#7A959E'];
                        activeCharts.push(new Chart(ctxT, {
                            type: 'bar',
                            data: {
                                labels: tipos,
                                datasets: [{
                                    data: counts,
                                    backgroundColor: tipos.map((_, i) => palette[i % palette.length]),
                                    borderRadius: 4,
                                    borderSkipped: false
                                }]
                            },
                            options: {
                                indexAxis: 'y',
                                plugins: { legend: { display: false } },
                                scales: {
                                    x: {
                                        beginAtZero: true,
                                        ticks: { font: chartFont, color: '#7A959E', stepSize: 1 },
                                        grid: { color: 'rgba(0,0,0,0.05)' }
                                    },
                                    y: {
                                        ticks: { font: chartFont, color: '#4A6670' },
                                        grid: { display: false }
                                    }
                                }
                            }
                        }));
                    }
                }, 100);
            }

            lucide.createIcons();
        }

        function renderizarTabla(data) {
            const tbody = document.getElementById('tablaBody');
            if (!tbody) return;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="padding:80px; text-align:center; color:var(--ocasa-text-3); font-weight:700; font-style:italic;">No existen registros</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(item => {
                const f    = item.fecha ? item.fecha.split('T')[0].split('-').reverse().join('/') : '-';
                const prio = (item.prioridad || 'Baja').toUpperCase();

                let statusClass = 'status-importante';
                if (item.estado.toUpperCase() === 'PENDIENTE') statusClass = 'status-atencion';

                // FIX: todos los textos usan style inline para garantizar visibilidad
                return `
                <tr style="border-top: 1px solid var(--ocasa-border); background:var(--ocasa-surface);"
                    onmouseover="this.style.background='var(--ocasa-surface-alt)'"
                    onmouseout="this.style.background='var(--ocasa-surface)'">
                    <td style="padding:16px; font-size:10px; font-weight:700; color:var(--ocasa-text-3); white-space:nowrap;">${f}</td>
                    <td style="padding:16px; font-weight:900; color:var(--ocasa-text-1);">${item.remito}</td>
                    <td style="padding:16px; font-weight:700; font-style:italic; font-size:14px; color:var(--ocasa-text-2);">${item.tipo}</td>
                    <td style="padding:16px;">
                        <span style="font-weight:700; font-size:10px; text-transform:uppercase; color:${prio === 'ALTA' ? 'var(--ocasa-danger)' : 'var(--ocasa-text-3)'};">${prio}</span>
                    </td>
                    <td style="padding:16px; font-size:12px; color:var(--ocasa-text-2); max-width:250px; word-break:break-word;">${item.descripcion || '-'}</td>
                    <td style="padding:16px; font-size:11px; font-style:italic; color:var(--ocasa-text-3); max-width:250px; word-break:break-word;">${item.resolucion || '-'}</td>
                    <td style="padding:16px; text-align:right;">
                        <span class="${statusClass}" style="padding:4px 10px; border-radius:var(--ocasa-radius-sm); font-weight:900; text-transform:uppercase; font-size:10px; letter-spacing:0.05em; white-space:nowrap;">
                            ${item.estado}
                        </span>
                    </td>
                </tr>`;
            }).join('');
        }

        function filtrarTabla() {
            const term = document.getElementById('searchTable').value.toLowerCase();
            const filtrados = datosFull.filter(d =>
                Object.values(d).some(val => val.toString().toLowerCase().includes(term))
            );
            renderizarTabla(filtrados);
        }

        async function init() {
            try {
                const res = await fetch(WEB_APP_URL);
                datosFull = await res.json();
                showView('home');
                lucide.createIcons();
                setTimeout(procesarAlertas, 800);
            } catch (e) { console.error("Error cargando datos"); }
        }
        init();
    </script>
</body>
</html>
