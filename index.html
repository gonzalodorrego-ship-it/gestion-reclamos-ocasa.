<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reclamos - OCASA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .navbar { background-color: #000; color: white; padding: 1rem; }
        .card { border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-radius: 15px; }
        .badge-pendiente { background-color: #ffc107; color: #000; }
        .badge-cerrado { background-color: #198754; color: #fff; }
    </style>
</head>
<body>

<nav class="navbar mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">OCASA - Panel de Gestión</span>
    </div>
</nav>

<div class="container">
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4">Base de Datos de Reclamos (420)</h2>
            <button onclick="obtenerReclamos()" class="btn btn-dark btn-sm">Actualizar Lista</button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Asunto</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="listaReclamos">
                    <tr><td colspan="4" class="text-center">Conectando con Supabase...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Tus credenciales detectadas
    const SUPABASE_URL = 'https://ctttghqfsgweoxdwclx.supabase.co';
    const SUPABASE_KEY = 'eyJhY...'; // Usá tu clave larga completa aquí

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function obtenerReclamos() {
        const tabla = document.getElementById('listaReclamos');
        
        try {
            const { data, error } = await _supabase
                .from('reclamos')
                .select('*');

            if (error) throw error;

            if (!data || data.length === 0) {
                tabla.innerHTML = '<tr><td colspan="4" class="text-center">No hay datos disponibles.</td></tr>';
                return;
            }

            tabla.innerHTML = '';
            data.forEach(item => {
                const fila = document.createElement('tr');
                // Acceso seguro a las columnas con mayúsculas
                fila.innerHTML = `
                    <td><strong>#${item.id}</strong></td>
                    <td>${item['Fecha de creación'] || '---'}</td>
                    <td>${item['Asunto'] || 'Sin Asunto'}</td>
                    <td>
                        <span class="badge ${item['Estado'] === 'Cerrado' ? 'badge-cerrado' : 'badge-pendiente'}">
                            ${item['Estado'] || 'Pendiente'}
                        </span>
                    </td>
                `;
                tabla.appendChild(fila);
            });

        } catch (err) {
            console.error('Error:', err);
            tabla.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Error: ${err.message}</td></tr>`;
        }
    }

    obtenerReclamos();
</script>
</body>
</html>
