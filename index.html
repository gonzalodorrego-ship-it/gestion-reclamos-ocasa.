<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reclamos - OCASA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #000; border-bottom: 4px solid #ffde00; padding: 15px 0; }
        .logo-img { height: 45px; }
        .card { border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; margin-top: 20px; }
        .table thead { background-color: #212529; color: white; }
        .badge-pendiente { background-color: #ffc107; color: #000; padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 0.85em; }
        .badge-cerrado { background-color: #198754; color: #fff; padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 0.85em; }
    </style>
</head>
<body>

<nav class="navbar shadow-sm">
    <div class="container d-flex align-items-center">
        <img src="logo_ocasa.png" alt="OCASA" class="logo-img" onerror="this.src='https://via.placeholder.com/120x45?text=OCASA'">
        <h1 class="h5 mb-0 text-white ms-3">Panel de Gestión de Reclamos</h1>
    </div>
</nav>

<div class="container">
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h5 mb-0">Base de Datos (420 Registros)</h2>
            <button onclick="obtenerReclamos()" class="btn btn-dark btn-sm">🔄 Actualizar</button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Asunto</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="listaReclamos">
                    <tr><td colspan="4" class="text-center py-5">Conectando con Supabase...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ctttghqfsgweoxdwclx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dHRnaHFmc2d3Z2VveGR3Y2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzM3MjgsImV4cCI6MjA4ODA0OTcyOH0.ruZDmt_8xGhFiwHjEsrqKVfCkemj_r3XK7ieAWLTYE0';

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function obtenerReclamos() {
        const tabla = document.getElementById('listaReclamos');
        
        try {
            const { data, error } = await _supabase
                .from('reclamos')
                .select('*');

            if (error) throw error;

            tabla.innerHTML = '';
            if (data.length === 0) {
                tabla.innerHTML = '<tr><td colspan="4" class="text-center">No hay datos en la tabla.</td></tr>';
                return;
            }

            data.forEach(item => {
                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td><strong>#${item.id}</strong></td>
                    <td><small>${item['Fecha de creación'] || '---'}</small></td>
                    <td>${item.Asunto || 'Sin Asunto'}</td>
                    <td>
                        <span class="${item.Estado === 'Cerrado' ? 'badge-cerrado' : 'badge-pendiente'}">
                            ${item.Estado || 'Pendiente'}
                        </span>
                    </td>
                `;
                tabla.appendChild(fila);
            });
        } catch (err) {
            console.error('Error:', err);
            tabla.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-4">Error de conexión: ${err.message}</td></tr>`;
        }
    }

    obtenerReclamos();
</script>
</body>
</html>
