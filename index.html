<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCASA - Panel Operativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --ocasa-yellow: #ffde00; --ocasa-black: #1a1a1a; }
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Navbar Superior */
        .navbar { background-color: var(--ocasa-black); border-bottom: 4px solid var(--ocasa-yellow); padding: 15px; }
        .logo-img { height: 40px; }
        
        /* Sidebar / Menú Lateral */
        .nav-link { color: #555; border-radius: 8px; margin-bottom: 5px; font-weight: 500; }
        .nav-link.active { background-color: var(--ocasa-black); color: var(--ocasa-yellow); }
        .nav-link:hover:not(.active) { background-color: #e9ecef; }

        /* Contenedores */
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); background: white; }
        .btn-ocasa { background-color: var(--ocasa-black); color: white; border: none; font-weight: bold; transition: 0.3s; }
        .btn-ocasa:hover { background-color: #333; color: var(--ocasa-yellow); transform: translateY(-2px); }
        
        /* Status Badges */
        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .bg-pending { background-color: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
    <div class="container-fluid">
        <div class="d-flex align-items-center">
            <img src="logo_ocasa.png" alt="OCASA" class="logo-img" onerror="this.src='https://via.placeholder.com/120x40?text=OCASA'">
            <h1 class="h5 mb-0 text-white ms-3 d-none d-sm-block">GESTIÓN OPERATIVA</h1>
        </div>
        <div class="text-white small">Sesión: <strong>Gonzalo Dorrego</strong></div>
    </div>
</nav>

<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-3 col-lg-2 mb-4">
            <div class="card-custom p-3">
                <nav class="nav flex-column">
                    <a class="nav-link active" href="#" onclick="showSection('carga')">📝 Nueva Carga</a>
                    <a class="nav-link" href="#" onclick="showSection('historico')">📊 Ver Histórico</a>
                    <a class="nav-link" href="#" onclick="alert('Próximamente...')">📈 Reportes</a>
                    <hr>
                    <a class="nav-link text-danger" href="#">🚪 Salir</a>
                </nav>
            </div>
        </div>

        <div class="col-md-9 col-lg-10">
            
            <div id="section-carga" class="card-custom p-4">
                <h2 class="h4 fw-bold mb-4">Registro de Nuevo Reclamo</h2>
                <form id="formReclamo">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Asunto / Título</label>
                            <input type="text" id="asunto" class="form-control" placeholder="Ej: Error en despacho #450" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Prioridad</label>
                            <select id="prioridad" class="form-select">
                                <option value="Baja">Baja</option>
                                <option value="Media" selected>Media</option>
                                <option value="Alta">Alta</option>
                            </select>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label fw-bold">Descripción Detallada</label>
                            <textarea id="descripcion" class="form-control" rows="5" placeholder="Explique el reclamo aquí..." required></textarea>
                        </div>
                    </div>
                    <button type="submit" id="btnSubmit" class="btn btn-ocasa px-5 py-2">ENVIAR A PLANILLA</button>
                </form>
                <div id="successAlert" class="alert alert-success mt-3 d-none">✓ Reclamo enviado correctamente al Sheet.</div>
            </div>

            <div id="section-historico" class="card-custom p-4 d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h4 fw-bold mb-0">Historial Reciente</h2>
                    <button class="btn btn-sm btn-outline-dark">Refrescar</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Fecha</th>
                                <th>Asunto</th>
                                <th>Prioridad</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><small>Hoy</small></td>
                                <td>Ejemplo de carga enviada</td>
                                <td><span class="badge bg-secondary">Media</span></td>
                                <td><span class="status-pill bg-pending">Pendiente en Sheet</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // CAMBIA ESTA URL POR LA DE TU GOOGLE APPS SCRIPT
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/14T9wrhdyMLsn5s54oxtaxEdu0jrszlZYkrsYn6vY8lA/edit?gid=0#gid=0';

    function showSection(name) {
        document.getElementById('section-carga').classList.toggle('d-none', name !== 'carga');
        document.getElementById('section-historico').classList.toggle('d-none', name !== 'historico');
        // Cambiar estado activo en links
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.target.classList.add('active');
    }

    document.getElementById('formReclamo').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        const alert = document.getElementById('successAlert');

        btn.disabled = true;
        btn.innerText = 'Enviando...';

        const payload = {
            asunto: document.getElementById('asunto').value,
            descripcion: document.getElementById('descripcion').value,
            prioridad: document.getElementById('prioridad').value,
            fecha: new Date().toLocaleString()
        };

        try {
            await fetch(SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            alert.classList.remove('d-none');
            document.getElementById('formReclamo').reset();
            setTimeout(() => alert.classList.add('d-none'), 4000);
        } catch (err) {
            console.error(err);
            alert('Error al conectar con Google Sheets.');
        } finally {
            btn.disabled = false;
            btn.innerText = 'ENVIAR A PLANILLA';
        }
    });
</script>
</body>
</html>
