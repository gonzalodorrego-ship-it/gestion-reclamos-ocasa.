<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCASA - Gestión Operativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .ocasa-yellow { color: #FFD700; }
        .bg-ocasa-yellow { background-color: #FFD700; }
        .bg-ocasa-black { background-color: #1a1a1a; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="w-64 bg-ocasa-black text-white flex flex-col shadow-2xl z-50">
        <div class="p-6 border-b border-white/10 flex flex-col items-center gap-4">
            <img src="logo_ocasa.png" alt="OCASA" class="w-32 h-auto rounded-sm">
            <span class="text-[10px] text-yellow-400 font-bold tracking-widest uppercase opacity-70">Panel Operativo</span>
        </div>
        <nav class="flex-1 px-4 py-8 space-y-2">
            <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-ocasa-yellow text-black font-bold shadow-lg shadow-yellow-500/20 active:scale-95 transition-all">
                <i data-lucide="plus-circle" class="w-5 h-5"></i> Nueva Carga
            </button>
            <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all group">
                <i data-lucide="clipboard-list" class="w-5 h-5 group-hover:text-ocasa-yellow"></i> Histórico
            </button>
        </nav>
        <div class="p-6 border-t border-white/10 text-[10px] text-gray-500 font-bold uppercase tracking-widest text-center">Gonzalo Dorrego</div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-gray-100 px-8 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-6">
                <img src="logo_ocasa.png" alt="OCASA" class="w-24 h-auto">
                <h2 class="text-xl font-bold text-gray-800 border-l pl-6 border-gray-100">Registro de Reclamo</h2>
            </div>
            <div class="flex items-center gap-3 border-l pl-6 border-gray-100">
                <div class="text-right">
                    <p class="text-sm font-bold leading-none mb-1">Gonzalo Dorrego</p>
                    <p class="text-[11px] text-gray-400 font-bold uppercase">Admin</p>
                </div>
                <div class="w-10 h-10 bg-ocasa-black rounded-full flex items-center justify-center text-ocasa-yellow">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-10 bg-gray-50/50">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                    <div class="bg-ocasa-black h-1.5 w-full"></div>
                    <form id="formReclamo" class="p-8 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="block text-xs font-black uppercase text-gray-400 tracking-widest">Tipo de Incidencia</label>
                                <select id="tipo" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-yellow-400 outline-none font-bold text-sm">
                                    <option>Despacho</option>
                                    <option>Inventario</option>
                                    <option>Recepción</option>
                                    <option>Proceso Interno</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="block text-xs font-black uppercase text-gray-400 tracking-widest">N° Remito / Orden</label>
                                <input type="text" id="remito" placeholder="Ej: EX-9003" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-yellow-400 outline-none text-sm">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-xs font-black uppercase text-gray-400 tracking-widest">Asunto del Reclamo</label>
                            <input type="text" id="asunto" required placeholder="Resumen corto del problema" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-yellow-400 outline-none text-sm font-medium">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-xs font-black uppercase text-gray-400 tracking-widest">Descripción detallada</label>
                            <textarea id="descripcion" rows="4" required placeholder="Describe lo ocurrido..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-yellow-400 outline-none text-sm resize-none"></textarea>
                        </div>
                        <div class="flex items-center justify-between pt-6 border-t border-gray-100">
                            <div class="flex items-center gap-3">
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-tight">Prioridad:</span>
                                <select id="prioridad" class="px-5 py-2 rounded-full border-2 border-orange-200 bg-orange-50 text-orange-700 text-xs font-black outline-none transition-all">
                                    <option value="Baja">Baja</option>
                                    <option value="Media" selected>Media</option>
                                    <option value="Alta">Alta</option>
                                </select>
                            </div>
                            <button type="submit" id="btnEnviar" class="bg-ocasa-black text-white px-10 py-4 rounded-2xl font-black text-sm flex items-center gap-3 hover:bg-black transition-all shadow-xl active:scale-95">
                                <i data-lucide="send" class="w-4 h-4 text-ocasa-yellow"></i> ENVIAR A PLANILLA
                            </button>
                        </div>
                    </form>
                </div>
                <div id="msgExito" class="hidden fixed bottom-8 right-8 animate-bounce z-50">
                    <div class="bg-green-600 text-white px-6 py-4 rounded-2xl flex items-center gap-3 font-bold shadow-2xl">
                        <i data-lucide="check-circle" class="w-6 h-6"></i> Registro cargado correctamente
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // ⚠️ IMPORTANTE: Mantén tu URL de Google Sheets aquí ⚠️
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbytAU4-kzsHv2qaxTmmvdOqnCFO_yXJdb7XPJMbbVLDpNk0mUz4q0zkwg0iWTJhFYAFYA/exec';

        document.getElementById('formReclamo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            const exito = document.getElementById('msgExito');

            const payload = {
                fecha: new Date().toLocaleString(),
                tipo: document.getElementById('tipo').value,
                remito: document.getElementById('remito').value,
                asunto: document.getElementById('asunto').value,
                descripcion: document.getElementById('descripcion').value,
                prioridad: document.getElementById('prioridad').value,
                usuario: "Gonzalo Dorrego"
            };

            btn.disabled = true;
            btn.innerHTML = "PROCESANDO...";

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(payload)
                });

                exito.classList.remove('hidden');
                document.getElementById('formReclamo').reset();
                setTimeout(() => { exito.classList.add('hidden'); }, 4000);

            } catch (error) {
                alert('Error al enviar los datos.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="send" class="w-4 h-4 text-ocasa-yellow"></i> ENVIAR A PLANILLA`;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
