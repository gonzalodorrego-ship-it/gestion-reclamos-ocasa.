<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reclamos - OCASA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #000 !important; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 12px; }
        .table thead { background-color: #212529; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">
            <img src="LOGO_ocasa.png" alt="Logo" height="40" onerror="this.style.display='none'"> 
            <span class="ms-2">Gestión de Reclamos</span>
        </a>
    </div>
</nav>

<div class="container">
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 mb-0">Base de Datos de Reclamos</h2>
            <button class="btn btn-primary btn-sm">Refrescar Datos</button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Asunto</th>
                        <th>Comentarios</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="listaReclamos">
                    <tr>
                        <td colspan="5" class="text-center text-muted">Cargando datos desde Supabase...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- PEGA TUS CREDENCIALES ACÁ ---
    const SUPABASE_URL = 'TU_URL_DE_SUPABASE'; 
    const SUPABASE_KEY = 'TU_KEY_DE_SUPABASE';
    // --------------------------------

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function obtenerReclamos() {
        const { data, error } = await _supabase
            .from('reclamos')
            .select('*');

        if (error) {
            console.error('Error al obtener datos:', error);
            document.getElementById('listaReclamos').innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error: ${error.message}</td></tr>`;
            return;
        }

        const tabla = document.getElementById('listaReclamos');
        tabla.innerHTML = ''; 

        if (data.length === 0) {
            tabla.innerHTML = '<tr><td colspan="5" class="text-center">No se encontraron registros.</td></tr>';
            return;
        }

        data.forEach(item => {
            const fila = document.createElement('tr');
            // Usamos corchetes para los nombres con espacios como 'Fecha de creación'
            fila.innerHTML = `
                <td><strong>#${item.id}</strong></td>
                <td>${item['Fecha de creación'] || '---'}</td>
                <td>${item.Asunto || '---'}</td>
                <td><small>${item.Comentarios || '---'}</small></td>
                <td>
                    <span class="badge ${item.Estado === 'Cerrado' ? 'bg-success' : 'bg-warning text-dark'}">
                        ${item.Estado || 'Pendiente'}
                    </span>
                </td>
            `;
            tabla.appendChild(fila);
        });
    }

    obtenerReclamos();
</script>

</body>
</html>
