<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCASA - Gestión de Reclamos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ocasa-cyan: #0097A7; }
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .bg-ocasa-cyan { background-color: var(--ocasa-cyan); }
        .text-ocasa-cyan { color: var(--ocasa-cyan); }
        
        /* Estilos de Scroll */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--ocasa-cyan); border-radius: 10px; }
        
        .btn-primary {
            background-color: var(--ocasa-cyan);
            color: white;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #007A87;
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-50">
        <div class="p-8 border-b border-slate-100 flex flex-col items-center gap-4">
            <div class="h-16 flex items-center justify-center">
                <img src="logo_ocasa.png" alt="OCASA" class="max-w-[160px] h-auto object-contain">
            </div>
            <span class="text-[10px] text-slate-400 font-black tracking-[0.2em] uppercase">Logística Integral</span>
        </div>
        
        <nav class="flex-1 px-4 py-8 space-y-3">
            <button onclick="location.reload()" class="w-full flex items-center gap-3 px-4 py-4 rounded-2xl btn-primary font-bold shadow-lg shadow-cyan-500/10 active:scale-95">
                <i data-lucide="plus-circle" class="w-5 h-5"></i> NUEVO RECLAMO
            </button>
            
            <button id="btnHistorico" class="w-full flex items-center gap-3 px-4 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 hover:text-ocasa-cyan transition-all group">
                <i data-lucide="history" class="w-5 h-5 group-hover:scale-110 transition-transform"></i> 
                <span class="font-bold text-sm uppercase tracking-tight">Histórico de Reclamos</span>
            </button>
        </nav>

        <div class="p-6 border-t border-slate-100 flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center font-black text-xs text-ocasa-cyan border border-slate-200">GD</div>
            <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-900">Gonzalo Dorrego</span>
                <span class="text-[9px] text-slate-400 uppercase font-black">Admin Sistema</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-100 px-10 flex items-center justify-between shadow-sm">
            <h2 class="text-lg font-black text-slate-800 uppercase tracking-tighter flex items-center gap-3">
                <span class="w-1.5 h-6 bg-ocasa-cyan rounded-full"></span>
                Gestión de Reclamos OCASA
            </h2>
            <div class="text-right">
                <span id="clock" class="text-sm font-bold text-slate-700 block">00:00:00</span>
                <span class="text-[9px] text-emerald-500 font-black uppercase tracking-widest">Conexión en Línea</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-12 bg-slate-50">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                    <div class="bg-ocasa-cyan h-2 w-full"></div>
                    <form id="formReclamo" class="p-10 space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-3">
                                <label class="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-1">Tipo de Reclamo</label>
                                <select id="tipo" class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-cyan-100 outline-none font-bold text-slate-700 transition-all">
                                    <option value="Caja rota">📦 Caja rota / Dañada</option>
                                    <option value="Producto equivocado">🔄 Producto equivocado</option>
                                    <option value="Color equivocado">🎨 Color equivocado</option>
                                    <option value="No recibi mi producto">🚫 No recibí mi producto</option>
                                </select>
                            </div>
                            <div class="space-y-3">
                                <label class="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-1">ID de Reclamo (N° Remito)</label>
                                <input type="text" id="remito" required placeholder="Ej: 0064-00076543" class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-cyan-100 outline-none font-bold text-slate-700 uppercase">
                            </div>
                        </div>

                        <div class="space-y-3">
                            <label class="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-1">Descripción Detallada</label>
                            <textarea id="descripcion" rows="4" required placeholder="Ingrese el detalle del reclamo aquí..." class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-cyan-100 outline-none font-medium text-slate-700 resize-none"></textarea>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-3">
                                <label class="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-1">Estado Operativo</label>
                                <select id="estado" class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none font-bold text-slate-700">
                                    <option>Pendiente</option>
                                    <option>En Proceso</option>
                                    <option>Finalizado</option>
                                </select>
                            </div>
                            <div class="space-y-3">
                                <label class="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-1">Prioridad de Atención</label>
                                <select id="prioridad" class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none font-bold text-slate-700">
                                    <option value="Baja">Baja</option>
                                    <option value="Media" selected>Media</option>
                                    <option value="Alta">Alta / Crítica</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex items-center justify-end pt-8">
                            <button type="submit" id="btnEnviar" class="btn-primary px-12 py-5 rounded-2xl font-black text-sm flex items-center gap-3 shadow-lg shadow-cyan-500/20 active:scale-95">
                                <i data-lucide="send" class="w-5 h-5"></i> REGISTRAR RECLAMO
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div id="modalHistorico" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
            <div class="bg-white w-full max-w-6xl rounded-[2.5rem] shadow-2xl flex flex-col max-h-[85vh] overflow-hidden">
                <div class="p-8 border-b border-slate-100 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="bg-ocasa-cyan/10 p-2 rounded-xl text-ocasa-cyan">
                            <i data-lucide="history" class="w-6 h-6"></i>
                        </div>
                        <h3 class="font-black text-xl uppercase tracking-tighter text-slate-800">Histórico de Reclamos</h3>
                    </div>
                    <button id="cerrarModal" class="p-2 hover:bg-slate-100 rounded-full text-slate-400 transition-colors">
                        <i data-lucide="x" class="w-8 h-8"></i>
                    </button>
                </div>
                
                <div class="flex-1 overflow-auto p-8 custom-scroll bg-slate-50/50">
                    <table class="w-full text-left border-separate border-spacing-y-3">
                        <thead>
                            <tr class="text-[11px] font-black text-slate-400 uppercase tracking-widest">
                                <th class="px-6 pb-2">Fecha</th>
                                <th class="px-6 pb-2">ID Reclamo</th>
                                <th class="px-6 pb-2">Categoría</th>
                                <th class="px-6 pb-2">Descripción</th>
                                <th class="px-6 pb-2">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCuerpo" class="text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxs6-28lVAXxzHRSCRVMijfUlJ7IWtImxlhatT1GNA4U3OLmx2A-E5eZXekfX1hrvxARQ/exec';
        
        // Reloj tiempo real
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        // Envío de formulario
        document.getElementById('formReclamo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            const payload = {
                fecha: new Date().toLocaleString(),
                tipo: document.getElementById('tipo').value,
                remito: document.getElementById('remito').value.trim().toUpperCase(),
                descripcion: document.getElementById('descripcion').value,
                prioridad: document.getElementById('prioridad').value,
                estado: document.getElementById('estado').value,
                usuario: "Gonzalo Dorrego"
            };

            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span> GUARDANDO...`;

            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("¡Reclamo registrado correctamente!");
                document.getElementById('formReclamo').reset();
            } catch (error) {
                alert("Error al conectar con la planilla.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="send" class="w-5 h-5"></i> REGISTRAR RECLAMO`;
                lucide.createIcons();
            }
        });

        // Cargar Histórico corregido
        async function cargarPanel() {
            const tabla = document.getElementById('tablaCuerpo');
            tabla.innerHTML = '<tr><td colspan="5" class="py-20 text-center text-slate-400 animate-pulse font-bold uppercase tracking-widest text-xs">Sincronizando con Google Sheets...</td></tr>';
            
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                renderizarTabla(data);
            } catch (e) {
                tabla.innerHTML = '<tr><td colspan="5" class="py-20 text-center text-red-400 font-bold uppercase text-xs">Error de conexión con la base de datos.</td></tr>';
            }
        }

        function renderizarTabla(data) {
            const tabla = document.getElementById('tablaCuerpo');
            tabla.innerHTML = '';
            
            data.forEach(item => {
                // Mapeo correcto de columnas según tu captura:
                // A: Fecha, B: Tipo, C: Remito, D: Descripcion, G: Estado
                const row = document.createElement('tr');
                row.className = "bg-white shadow-sm hover:shadow-md transition-shadow rounded-xl overflow-hidden";
                
                row.innerHTML = `
                    <td class="py-5 px-6 font-bold text-slate-400 text-[11px]">${item.fecha || '-'}</td>
                    <td class="py-5 px-6 font-black text-slate-800 tracking-tight">${item.remito || '-'}</td>
                    <td class="py-5 px-6"><span class="font-bold text-slate-600">${item.tipo || '-'}</span></td>
                    <td class="py-5 px-6 text-slate-500 italic text-[12px] max-w-xs truncate">${item.descripcion || '-'}</td>
                    <td class="py-5 px-6">
                        <span class="px-3 py-1 rounded-full bg-cyan-50 text-ocasa-cyan text-[10px] font-black uppercase">
                            ${item.estado || 'PENDIENTE'}
                        </span>
                    </td>
                `;
                tabla.appendChild(row);
            });
        }

        // Eventos de Modal
        document.getElementById('btnHistorico').addEventListener('click', () => {
            document.getElementById('modalHistorico').classList.remove('hidden');
            cargarPanel();
        });
        document.getElementById('cerrarModal').addEventListener('click', () => {
            document.getElementById('modalHistorico').classList.add('hidden');
        });
    </script>
</body>
</html>
