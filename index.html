<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reclamos - OCASA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #000 !important; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">
            <img src="LOGO_ocasa.png" alt="Logo" height="40"> 
            <span class="ms-2">Gestión de Reclamos</span>
        </a>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Listado de Reclamos (420)</h2>
        <button class="btn btn-primary">Nuevo Reclamo</button>
    </div>

    <div class="card p-3">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Asunto</th>
                    <th>Comentarios</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="listaReclamos">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Configuración de Supabase (Asegúrate de que estos datos sean los tuyos)
    const SUPABASE_URL = 'TU_URL_DE_SUPABASE'; 
    const SUPABASE_KEY = 'TU_KEY_DE_SUPABASE';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function obtenerReclamos() {
        const { data, error } = await _supabase
            .from('reclamos')
            .select('*');

        if (error) {
            console.error('Error:', error);
            return;
        }

        const tabla = document.getElementById('listaReclamos');
        tabla.innerHTML = ''; 

        data.forEach(item => {
            const fila = document.createElement('tr');
            fila.innerHTML = `
                <td>${item.id}</td>
                <td>${item['Fecha de creación'] || 'Sin fecha'}</td>
                <td>${item.Asunto || 'Sin asunto'}</td>
                <td>${item.Comentarios || 'Sin detalle'}</td>
                <td><span class="badge ${item.Estado === 'Cerrado' ? 'bg-success' : 'bg-warning'}">${item.Estado || 'Pendiente'}</span></td>
            `;
            tabla.appendChild(fila);
        });
    }

    obtenerReclamos();
</script>

</body>
</html>
